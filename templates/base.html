<!DOCTYPE html>
<html lang="en">

    <title>{{block "title" .}}F3 Denver Help Desk{{end}}</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="{{block "bodyclass" .}}{{end}}">

        <div class="header-inner">
            <a href="/" class="logo">F3 Denver <span>Help Desk</span></a>
            <nav>

    <main class="container">
        {{template "content" .}}
    </main>
    <footer>
        F3 Denver Help Desk &mdash; For PAX only
    </footer>
</body>
</html>
